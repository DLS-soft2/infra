include:
  - docker-compose.kafka.yaml

services:
  # --- Infrastructure ---

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Substituted into dls-realm.json on import; real values live in docker/.env (gitignored)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-google-oauth-not-configured}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-google-oauth-not-configured}
    volumes:
      - ./keycloak/dls-realm.json:/opt/keycloak/data/import/dls-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo done"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - default

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - default

  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - default

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - default

  ollama:
    image: ollama/ollama:0.30.8
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - default

  # One-shot: pulls the model into ollama_data on first run (~2.5 GB), no-op afterwards
  ollama-pull:
    image: ollama/ollama:0.30.8
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-qwen3:4b}"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - default

  # --- Application Services ---

  api-gateway:
    build:
      context: ../../api-gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      KEYCLOAK_ISSUER_URL: http://localhost:8080/realms/dls
      KEYCLOAK_JWKS_ISSUER_URL: http://keycloak:8080/realms/dls
      KEYCLOAK_AUDIENCE: dls-gateway
      PROXY_TIMEOUT_SECONDS: "30"
      ORDER_SERVICE_BASE_URL: http://order-service:8000
      RESTAURANT_SERVICE_BASE_URL: http://restaurant-service:8000
      COURIER_SERVICE_BASE_URL: http://courier-service:8000
      PAYMENT_SERVICE_BASE_URL: http://payment-service:8000
      NOTIFICATION_SERVICE_BASE_URL: http://notification-service:8000
      USER_SERVICE_BASE_URL: http://user-service:8000
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - default

  order-service:
    build:
      context: ../../order-service
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/order_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - default

  payment-service:
    build:
      context: ../../payment-service
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payment_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - default

  restaurant-service:
    build:
      context: ../../restaurant-service
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/restaurant_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - default

  courier-service:
    build:
      context: ../../courier-service
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/courier_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_JPA_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - default

  notification-service:
    build:
      context: ../../notification-service
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default

  frontend:
    build:
      context: ../../frontend
      args:
        VITE_API_BASE_URL: ""
        VITE_KEYCLOAK_URL: http://localhost:8080
        VITE_NOTIFICATION_WS_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - default
  
  user-service:
    build:
      context: ../../user-service
      dockerfile: Dockerfile
    ports:
      - "8007:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/user_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  ai-service:
    build:
      context: ../../ai-service
      dockerfile: Dockerfile
    ports:
      - "8006:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    networks:
      - default

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  ollama_data:

networks:
  default:
    driver: bridge
