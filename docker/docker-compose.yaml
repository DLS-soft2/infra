include:
  - docker-compose.kafka.yaml

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/dls-realm.json:/opt/keycloak/data/import/dls-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo done"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - default

  api-gateway:
    build:
      context: ../../api-gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      KEYCLOAK_ISSUER_URL: http://keycloak:8080/realms/dls
      KEYCLOAK_AUDIENCE: dls-gateway
      PROXY_TIMEOUT_SECONDS: "30"
      ORDER_SERVICE_BASE_URL: http://order-service:8000
      RESTAURANT_SERVICE_BASE_URL: http://restaurant-service:8080
      COURIER_SERVICE_BASE_URL: http://courier-service:8080
      PAYMENT_SERVICE_BASE_URL: http://payment-service:8000
      NOTIFICATION_SERVICE_BASE_URL: http://notification-service:8000
      USER_SERVICE_BASE_URL: http://user-service:8000
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - default

  order-service:
    image: ghcr.io/dls-soft2/order-service:latest
    ports:
      - "8001:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - default

networks:
  default:
    driver: bridge
