apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-service-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  service-logs.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "$service logs",
          "type": "logs",
          "gridPos": { "h": 24, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"dls\", pod=~\"$service.*\"}",
              "queryType": "range"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["dls-2", "logs", "loki"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "All", "value": "$__all" },
            "datasource": { "type": "loki", "uid": "loki" },
            "definition": "label_values({namespace=\"dls\"}, pod)",
            "hide": 0,
            "includeAll": true,
            "allValue": ".*",
            "label": "Service",
            "multi": false,
            "name": "service",
            "query": "label_values({namespace=\"dls\"}, pod)",
            "refresh": 2,
            "regex": "/^([a-z]+-?[a-z]+)/",
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "DLS-2 Service Logs",
      "uid": "dls-service-logs",
      "version": 2
    }
