apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-saga-flow
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  saga-flow.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 100,
          "title": "Saga Service Health",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 1,
          "title": "Order Service",
          "type": "stat",
          "gridPos": { "h": 4, "w": 5, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "up{job=~\".*order-service.*\"}",
              "legendFormat": "Order Service"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "text": "DOWN", "color": "red" },
                    "1": { "text": "UP", "color": "green" }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 1, "color": "green" }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name"
          }
        },
        {
          "id": 2,
          "title": "Payment Service",
          "type": "stat",
