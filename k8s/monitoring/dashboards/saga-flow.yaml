        {
          "id": 101,
          "title": "Saga Errors",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 6,
          "title": "Saga Service Errors",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(http_requests_total{namespace=\"dls\", pod=~\"order-service.*|payment-service.*|notification-service.*\", status_code=~\"5..\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}"
            },
            {
              "refId": "B",
              "expr": "sum(rate(http_server_requests_seconds_count{namespace=\"dls\", pod=~\"restaurant-service.*|courier-service.*\", status=~\"5..\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          }
        },
        {
          "id": 102,
          "title": "Saga Endpoint Activity",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 7,
          "title": "Order Service Endpoints",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(http_requests_total{namespace=\"dls\", pod=~\"order-service.*\", handler!=\"/metrics\", handler!=\"/health\", handler!=\"/healthy\"}[5m])) by (handler, status_code)",
              "legendFormat": "{{ handler }} [{{ status_code }}]"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
