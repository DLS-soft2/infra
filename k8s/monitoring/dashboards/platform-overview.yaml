        },
        {
          "id": 11,
          "title": "Pod Restarts",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"dls\"}) by (pod)",
              "legendFormat": "{{ pod }}",
              "format": "table",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 3 },
                  { "color": "red", "value": 10 }
                ]
              },
              "custom": { "filterable": true }
            },
            "overrides": []
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "renameByName": { "pod": "Pod", "Value": "Restarts" }
              }
            }
          ],
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "Restarts", "desc": true }]
          }
        },
        {
          "id": 102,
          "title": "Resources",
