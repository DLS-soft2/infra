        {
          "id": 101,
          "title": "Errors",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 9,
          "title": "5xx Errors by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(http_requests_total{namespace=\"dls\", status_code=~\"5..\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}"
            },
            {
              "refId": "B",
              "expr": "sum(rate(http_server_requests_seconds_count{namespace=\"dls\", status=~\"5..\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          }
        },
        {
          "id": 10,
          "title": "4xx Errors by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(http_requests_total{namespace=\"dls\", status_code=~\"4..\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}"
            },
            {
              "refId": "B",
              "expr": "sum(rate(http_server_requests_seconds_count{namespace=\"dls\", status=~\"4..\"}[5m])) by (pod)",
