apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: dls
  labels:
    app: ollama
spec:
  clusterIP: None
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
  namespace: dls
  labels:
    app: ollama
spec:
  serviceName: ollama
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.30.8
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          lifecycle:
            # Pull the model once the server is up; no-op when already in the volume
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "for i in $(seq 1 60); do ollama pull qwen3:4b && exit 0; sleep 5; done; exit 1"
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "8Gi"
              cpu: "4"
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: ollama-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi
