apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-service
  namespace: dls
spec:
  replicas: 1
  selector:
    matchLabels:
      app: restaurant-service
  template:
    metadata:
      labels:
        app: restaurant-service
    spec:
      containers:
        - name: restaurant-service
          image: ghcr.io/dls-soft2/restaurant-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: SPRING_DATA_MONGODB_URI
              value: "mongodb://mongodb:27017/restaurant_db"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: SERVER_PORT
              value: "8000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: restaurant-service
  namespace: dls
  labels:
    app: restaurant-service
    monitoring: enabled
spec:
  type: ClusterIP
  selector:
    app: restaurant-service
  ports:
    - name: http
      port: 80
      targetPort: 8000
