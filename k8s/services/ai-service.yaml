apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: dls
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/dls-soft2/ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            # Ollama must be running on host; fallback scorer activates if unreachable
            - name: OLLAMA_BASE_URL
              value: "http://host.minikube.internal:11434"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: dls
spec:
  type: ClusterIP
  selector:
    app: ai-service
  ports:
    - port: 80
      targetPort: 8000
