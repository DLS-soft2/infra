apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: dls
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/dls-soft2/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            # Replace MINIKUBE_IP with actual minikube ip at deploy time
            - name: KEYCLOAK_ISSUER_URL
              value: "http://MINIKUBE_IP:30080/realms/dls"
            - name: KEYCLOAK_JWKS_ISSUER_URL
              value: "http://keycloak:8080/realms/dls"
            - name: KEYCLOAK_AUDIENCE
              value: "dls-gateway"
            - name: PROXY_TIMEOUT_SECONDS
              value: "30"
            - name: ORDER_SERVICE_BASE_URL
              value: "http://order-service"
            - name: RESTAURANT_SERVICE_BASE_URL
              value: "http://restaurant-service"
            - name: COURIER_SERVICE_BASE_URL
              value: "http://courier-service"
            - name: PAYMENT_SERVICE_BASE_URL
              value: "http://payment-service"
            - name: NOTIFICATION_SERVICE_BASE_URL
              value: "http://notification-service"
            - name: USER_SERVICE_BASE_URL
              value: "http://user-service"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthy
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthy
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: dls
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-external
  namespace: dls
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30000
