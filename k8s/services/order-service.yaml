apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: dls
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ghcr.io/dls-soft2/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dls-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://postgres:$(DB_PASSWORD)@postgres:5432/order_db"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: KAFKA_TOPIC_ORDERS
              value: "orders"
            - name: KAFKA_TOPIC_PAYMENTS
              value: "payments"
            - name: KAFKA_TOPIC_RESTAURANTS
              value: "restaurants"
            - name: KAFKA_TOPIC_COURIERS
              value: "couriers"
            - name: KAFKA_TOPIC_DELIVERIES
              value: "deliveries"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: dls
  labels:
    app: order-service
    monitoring: enabled
    service-type: python
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - name: http
      port: 80
      targetPort: 8000
