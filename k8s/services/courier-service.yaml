apiVersion: apps/v1
kind: Deployment
metadata:
  name: courier-service
  namespace: dls
spec:
  replicas: 1
  selector:
    matchLabels:
      app: courier-service
  template:
    metadata:
      labels:
        app: courier-service
    spec:
      containers:
        - name: courier-service
          image: ghcr.io/dls-soft2/courier-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/courier_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dls-secrets
                  key: postgres-password
            - name: SPRING_DATASOURCE_DRIVER
              value: "org.postgresql.Driver"
            - name: SPRING_JPA_DIALECT
              value: "org.hibernate.dialect.PostgreSQLDialect"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: AI_SERVICE_URL
              value: "http://ai-service:80"
            - name: SERVER_PORT
              value: "8000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: courier-service
  namespace: dls
spec:
  type: ClusterIP
  selector:
    app: courier-service
  ports:
    - port: 80
      targetPort: 8000
